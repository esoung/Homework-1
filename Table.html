<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 05 - Tables</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">

</head>
<body>
    <h1>Student List</h1>
    <Table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Order</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>1</th>
                <th>Mr.A</th>
                <th>...</th>
            </tr>
            <tr>
                <th>2</th>
                <th>Mr.B</th>
                <th>...</th>
            </tr>
            <tr>
                <th>3</th>
                <th>Mr.C</th>
                <th>...</th>
            </tr>
        </tbody>
        

    </Table>
 
    
</body>

</html>
